set-option -g mode-style "fg=black,bg=yellow"
set-option -g copy-mode-match-style "fg=yellow"
set-option -g copy-mode-current-match-style "fg=yellow,bg=blue,bold"
set-option -g display-panes-colour "blue"
set-option -g display-panes-active-colour "yellow"

set-option -g status-style "fg=white,bg=brightblack"
set-option -gw window-status-current-style "fg=brightblack,bg=white,bold"

set-option -g message-style "fg=white,bg=brightblack,bold"
set-option -g message-command-style "fg=white,bg=black"

set-option -g menu-style "fg=white,bg=brightblack"
set-option -g menu-border-style "fg=white,bg=brightblack"
set-option -g menu-selected-style "fg=brightblack,bg=yellow"

set-option -g popup-style "fg=white"
set-option -g popup-border-style "fg=white"

set-option -gw pane-active-border-style "fg=brightblack"
set-option -gw pane-border-style "fg=brightblack"
set-option -gw pane-border-indicators "off"

set-option -g mode-style "fg=black,bg=white"
set-option -g copy-mode-match-style "fg=black,bg=green"
set-option -g copy-mode-current-match-style "fg=black,bg=cyan,bold"
set-option -g display-panes-colour "green"
set-option -g display-panes-active-colour "white"

set-option -g status-style "fg=white,bg=black"
set-option -gw window-status-current-style "fg=black,bg=white,bold"

set-option -g message-style "fg=white,bg=black,bold"
set-option -g message-command-style "fg=blue,bg=black"

set-option -g menu-style "fg=white,bg=black"
set-option -g menu-border-style "fg=white,bg=black"
set-option -g menu-selected-style "fg=black,bg=white"

set-option -g popup-style "fg=white,bg=black"
set-option -g popup-border-style "fg=white,bg=black"

set-option -gw pane-active-border-style "fg=red,bg=black"
set-option -gw pane-border-style "fg=red,bg=black"
set-option -gw pane-border-indicators "off"
